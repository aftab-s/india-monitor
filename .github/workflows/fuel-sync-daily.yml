name: Fuel prices sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync fuel prices (petrol + diesel)
        env:
          INDIAN_API_KEY: ${{ secrets.INDIAN_API_KEY }}
        run: npm ci && npm run fuel:sync

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/fuel-prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh fuel-prices.json"
            git push
          fi
