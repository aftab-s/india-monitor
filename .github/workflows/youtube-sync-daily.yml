name: YouTube live cache sync

on:
  schedule:
    - cron: "30 1 * * *" # 07:00 IST (= 01:30 UTC), GitHub uses UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync YouTube live cache
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm ci && npm run youtube:sync

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/youtube-live-cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh youtube-live-cache.json"
            git push
          fi
